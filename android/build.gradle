// Top-level build file where you can add configuration options common to all sub-projects/modules.

// Explicitly pin SDK versions required by React Native 0.76+ / Expo SDK 54+.
// These must be set BEFORE expo-root-project is applied so its setIfNotExist() check
// finds them already populated and does not override them with stale catalog values.
ext {
    minSdkVersion    = 24
    compileSdkVersion = 36
    targetSdkVersion  = 36
    ndkVersion        = "27.1.12297006"
    buildToolsVersion = "35.0.0"
}

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

